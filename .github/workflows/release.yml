name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, for example v1.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build release package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke test CLI
        run: node bin/buildby.js --help

      - name: Pack npm package
        run: |
          mkdir -p dist
          npm pack --pack-destination dist

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: dist/*.tgz
          if-no-files-found: error

      - name: Upload package to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/*.tgz --clobber
          else
            gh release create "$TAG_NAME" dist/*.tgz --title "$TAG_NAME" --generate-notes
          fi
