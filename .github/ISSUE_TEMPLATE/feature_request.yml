name: Feature request
description: Suggest a new detector, platform improvement, or CLI enhancement.
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that buildby does not handle well today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should buildby add or change?
    validations:
      required: true
  - type: input
    id: app
    attributes:
      label: Example app or framework
      placeholder: Electron, Flutter, Tauri, Qt, Unity, etc.
  - type: textarea
    id: evidence
    attributes:
      label: Detection evidence
      description: If this is a new detector, list files, frameworks, DLLs, bundle metadata, or command output that can identify it.
      render: text
  - type: textarea
    id: context
    attributes:
      label: Additional context
